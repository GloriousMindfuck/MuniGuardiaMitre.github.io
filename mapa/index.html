<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa del Sendero</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family: Arial;
margin:0;
}

#map{
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-40.43, -63.67], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution:'© OpenStreetMap'
}).addTo(map);

// Inicio del sendero
L.marker([-40.43, -63.67]).addTo(map)
.bindPopup("Inicio del Sendero");

// Fin del sendero
L.marker([-40.435, -63.675]).addTo(map)
.bindPopup("Fin del Sendero");

// Ruta del sendero
var ruta = [
[-40.43,-63.67],
[-40.432,-63.671],
[-40.433,-63.672],
[-40.435,-63.675]
];

L.polyline(ruta,{color:'green',weight:4}).addTo(map);

</script>

</body>
</html>
